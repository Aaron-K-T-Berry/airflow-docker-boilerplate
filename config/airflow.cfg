# Minimal Airflow 3 config overrides for this boilerplate.
# Most runtime settings are provided via environment variables in docker-compose.yaml.
# Prefer env vars (AIRFLOW__SECTION__KEY) over editing this file.

[core]
# Custom DAG folder used by this project (also set via AIRFLOW__CORE__DAGS_FOLDER).
dags_folder = /data/airflow/dags
default_timezone = Australia/Sydney
load_examples = False
dags_are_paused_at_creation = True
